<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry Vinu Sri 😢</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

  :root {
    --pink-bg: #fce4f0;
    --deep-pink: #d4547a;
    --hot-pink: #e8739a;
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --text-dark: #7a1040;
    --white: #fff8fc;
    --btn-shadow: #a03058;
  }

  body {
    background-color: #fce4f0;
    background-image:
      linear-gradient(rgba(232,115,154,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,115,154,0.07) 1px, transparent 1px);
    background-size: 16px 16px;
    min-height: 100vh;
    font-family: 'Silkscreen', monospace;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  /* ── PIXEL CORNER BORDER ── */
  .px-border {
    position: fixed; inset: 10px;
    border: 3px solid rgba(212,84,122,0.18);
    pointer-events: none; z-index: 0;
  }
  .px-border::before {
    content: ''; position: absolute;
    top: -5px; left: -5px;
    width: 10px; height: 10px;
    background: var(--deep-pink); opacity: 0.4;
  }
  .px-border::after {
    content: ''; position: absolute;
    bottom: -5px; right: -5px;
    width: 10px; height: 10px;
    background: var(--deep-pink); opacity: 0.4;
  }

  /* ── BACK ── */
  .back-btn {
    align-self: flex-start;
    font-family: 'Silkscreen', monospace;
    font-size: 0.55rem;
    color: var(--deep-pink);
    text-decoration: none;
    padding: 8px 14px;
    background: var(--white);
    border-top: 3px solid #ffd6e7;
    border-left: 3px solid #ffd6e7;
    border-right: 3px solid var(--btn-shadow);
    border-bottom: 3px solid var(--btn-shadow);
    box-shadow: 3px 3px 0 #7a1040;
    margin-bottom: 20px;
    letter-spacing: 0.08em;
    transition: transform 0.1s steps(1), box-shadow 0.1s steps(1);
    position: relative; z-index: 2;
  }
  .back-btn:hover { transform: translate(2px,2px); box-shadow: 1px 1px 0 #7a1040; }

  @keyframes pixelIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── SCENE ── */
  .scene {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    position: relative; z-index: 2;
  }

  /* ── PAGE TITLE ── */
  .page-title {
    font-size: clamp(0.7rem, 3vw, 1rem);
    color: var(--deep-pink);
    letter-spacing: 0.1em;
    text-align: center;
    opacity: 0;
    animation: pixelIn 0.4s steps(1) 0.2s forwards;
  }

  /* ── BIG CRYING PIXEL FACE ── */
  .big-cry {
    position: relative;
    opacity: 0;
    animation: pixelIn 0.4s steps(1) 0.5s forwards, cryShake 2s steps(3) 0.5s infinite;
  }

  @keyframes cryShake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-4px); }
    75%      { transform: translateX(4px); }
  }

  .big-face {
    width: 120px; height: 120px;
    background: #ffda9e;
    border-top: 5px solid #e8a060;
    border-left: 5px solid #e8a060;
    border-right: 5px solid #b06820;
    border-bottom: 5px solid #b06820;
    box-shadow: 5px 5px 0 #804010;
    position: relative;
    margin: 0 auto;
  }

  /* Eyes */
  .big-eyes {
    position: absolute;
    top: 30px; width: 100%;
    display: flex;
    justify-content: center;
    gap: 24px;
  }

  .big-eye {
    width: 10px; height: 5px;
    background: #5a2800;
    position: relative;
  }

  .big-tear {
    position: absolute;
    width: 6px;
    background: #88ccff;
    border-bottom: 2px solid #5599ee;
    animation: bigTear 0.7s steps(5) infinite;
    top: 5px; left: 0;
  }

  .big-tear.r { animation-delay: 0.35s; }

  @keyframes bigTear {
    0%   { height: 0px;  opacity: 1; }
    60%  { height: 18px; opacity: 1; }
    100% { height: 6px;  opacity: 0; top: 22px; }
  }

  /* Mouth sad */
  .big-mouth {
    position: absolute;
    bottom: 22px;
    left: 50%; transform: translateX(-50%) scaleY(-1);
    width: 36px; height: 14px;
    border-bottom: 5px solid #5a2800;
    border-left: 5px solid #5a2800;
    border-right: 5px solid #5a2800;
    border-top: none;
    border-radius: 0 0 18px 18px;
  }

  /* Sweat drop */
  .sweat {
    position: absolute;
    top: 8px; right: -18px;
    width: 10px; height: 14px;
    background: #aaddff;
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    border: 2px solid #5599ee;
    animation: sweatBounce 1.5s steps(2) infinite;
  }

  @keyframes sweatBounce {
    0%,100% { transform: translateY(0); opacity: 1; }
    50%      { transform: translateY(4px); opacity: 0.6; }
  }

  /* ── APOLOGY NOTES ── */
  .notes-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    opacity: 0;
    animation: pixelIn 0.4s steps(1) 0.9s forwards;
  }

  .note-frame {
    width: 100%;
    background: var(--white);
    border-top: 4px solid #ffd6e7;
    border-left: 4px solid #ffd6e7;
    border-right: 4px solid var(--btn-shadow);
    border-bottom: 4px solid var(--btn-shadow);
    box-shadow: 5px 5px 0 #7a1040;
    padding: 8px;
  }

  .note-frame img {
    width: 100%;
    height: auto;
    display: block;
    image-rendering: auto;
  }

  /* ── HOME BUTTON ── */
  .home-btn {
    font-family: 'Silkscreen', monospace;
    font-size: 0.52rem;
    color: var(--white);
    background: var(--deep-pink);
    border: none;
    padding: 12px 22px;
    cursor: pointer;
    border-top: 3px solid #f4a7c3;
    border-left: 3px solid #f4a7c3;
    border-right: 3px solid #7a1040;
    border-bottom: 3px solid #7a1040;
    box-shadow: 4px 4px 0 #4a0820;
    letter-spacing: 0.1em;
    text-decoration: none;
    display: inline-block;
    margin-top: 4px;
    transition: transform 0.1s steps(1), box-shadow 0.1s steps(1);
    opacity: 0;
    animation: pixelIn 0.4s steps(1) 1.2s forwards;
  }

  .home-btn:hover { transform: translate(2px,2px); box-shadow: 2px 2px 0 #4a0820; }
</style>
</head>
<body>

<div class="px-border"></div>
<a href="cake.html" class="back-btn">← BACK</a>

<div class="scene">

  <div class="page-title">😢 I OWE YOU AN APOLOGY</div>

  <!-- Big crying pixel face -->
  <div class="big-cry">
    <div class="big-face">
      <div class="big-eyes">
        <div class="big-eye">
          <div class="big-tear"></div>
        </div>
        <div class="big-eye">
          <div class="big-tear r"></div>
        </div>
      </div>
      <div class="big-mouth"></div>
    </div>
    <div class="sweat"></div>
  </div>

  <!-- Apology notes -->
  <div class="notes-wrap" id="notesWrap">
    <div class="note-frame">
      <img src="apology1.jpeg" alt="Apology Note 1"
        onerror="this.style.display='none'">
    </div>
    <div class="note-frame">
      <img src="apology2.jpeg" alt="Apology Note 2"
        onerror="this.style.display='none'">
    </div>
  </div>

  <a href="index.html" class="home-btn">♥ GO BACK HOME</a>

</div>
